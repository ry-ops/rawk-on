name: Deploy privacy page to GitHub Pages

# Publishes the contents of public/ (privacy.html + icons) to GitHub Pages,
# giving the Chrome Web Store a public privacy-policy URL:
#   https://ry-ops.github.io/rawk-on/privacy.html
on:
  push:
    branches: [main]
    paths: ['public/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
